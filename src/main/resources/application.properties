spring.application.name=carparkapi

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:7080/realms/carparkapi

spring.datasource.url=jdbc:h2:mem:carparkapidb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

app.config.enableDebugging=yes
app.config.totalSpaces=20